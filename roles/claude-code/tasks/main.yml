---
- name: Get home directory for {{ user_name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"

- name: Set user home directory fact
  ansible.builtin.set_fact:
    user_home: "{{ ansible_facts.getent_passwd[user_name][4] }}"

- name: Create ~/.claude directory
  ansible.builtin.file:
    path: "{{ user_home }}/.claude"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Deploy ~/.claude/settings.json from template
  ansible.builtin.template:
    src: claude-settings.json.j2
    dest: "{{ user_home }}/.claude/settings.json"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Install Claude Code using the official installer
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
  become: true
  become_user: "{{ user_name }}"
  args:
    creates: "{{ user_home }}/.local/bin/claude"

- name: Add ~/.local/bin to PATH in ~/.bashrc
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    regexp: '(^|^export )PATH=.*\.local/bin'
    create: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

# Headless OAuth token (optional). When claude_code_oauth_token is set,
# write it to ~/.claude/claude-code.env (mode 0600) and source it from
# ~/.bashrc so CLAUDE_CODE_OAUTH_TOKEN is available to every shell.
# This skips the interactive `claude login` on freshly provisioned VMs.
# We also pre-seed ~/.claude.json with hasCompletedOnboarding=true so
# the first `claude` invocation skips the theme / trust / login flow.
- name: Mark Claude Code onboarding as complete
  ansible.builtin.copy:
    dest: "{{ user_home }}/.claude.json"
    content: |
      {
        "hasCompletedOnboarding": true
      }
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0600"
    force: false
  when: claude_code_oauth_token | length > 0

- name: Deploy Claude Code OAuth token env file
  ansible.builtin.template:
    src: claude-code.env.j2
    dest: "{{ user_home }}/.claude/claude-code.env"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0600"
  when: claude_code_oauth_token | length > 0
  no_log: true

- name: Source ~/.claude/claude-code.env from ~/.bashrc
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bashrc"
    line: '[ -f "$HOME/.claude/claude-code.env" ] && . "$HOME/.claude/claude-code.env"'
    regexp: '\.claude/claude-code\.env'
    create: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

# Notification hooks (optional). When enabled, Claude Code's Stop hook
# POSTs a notification to a webhook (e.g. a Home Assistant webhook) and
# the UserPromptSubmit / SessionEnd hooks clear it.
- name: Fail when notifications are enabled but no webhook URL is set
  ansible.builtin.assert:
    that:
      - claude_code_notifications_webhook_url | length > 0
    fail_msg: >-
      claude_code_notifications_enabled is true but
      claude_code_notifications_webhook_url is empty. Set it via group_vars,
      host_vars, --extra-vars, or an Ansible vault.
  when: claude_code_notifications_enabled

- name: Create ~/.claude/hooks directory
  ansible.builtin.file:
    path: "{{ user_home }}/.claude/hooks"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  when: claude_code_notifications_enabled

- name: Deploy notify-stop.sh hook
  ansible.builtin.copy:
    src: notify-stop.sh
    dest: "{{ user_home }}/.claude/hooks/notify-stop.sh"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  when: claude_code_notifications_enabled

- name: Deploy notify-clear.sh hook
  ansible.builtin.copy:
    src: notify-clear.sh
    dest: "{{ user_home }}/.claude/hooks/notify-clear.sh"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  when: claude_code_notifications_enabled

- name: Deploy notification webhook env file
  ansible.builtin.template:
    src: notify.env.j2
    dest: "{{ user_home }}/.claude/hooks/notify.env"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0600"
  when: claude_code_notifications_enabled
  no_log: true
