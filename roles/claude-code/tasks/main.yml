---
- name: Get home directory for {{ user_name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"

- name: Set user home directory fact
  ansible.builtin.set_fact:
    user_home: "{{ ansible_facts.getent_passwd[user_name][4] }}"

- name: Create ~/.claude directory
  ansible.builtin.file:
    path: "{{ user_home }}/.claude"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Deploy ~/.claude/settings.json from template
  ansible.builtin.template:
    src: claude-settings.json.j2
    dest: "{{ user_home }}/.claude/settings.json"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Install Claude Code using the official installer
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
  become: true
  become_user: "{{ user_name }}"
  args:
    creates: "{{ user_home }}/.local/bin/claude"
