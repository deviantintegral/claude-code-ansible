---
- name: Create ~/.claude directory
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.claude"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Deploy ~/.claude/settings.json from template
  ansible.builtin.template:
    src: claude-settings.json.j2
    dest: "/home/{{ user_name }}/.claude/settings.json"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Install Claude Code using the official installer
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
  become: true
  become_user: "{{ user_name }}"
  args:
    creates: "/home/{{ user_name }}/.local/bin/claude"
