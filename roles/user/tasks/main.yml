---
- name: Generate a secure random password
  ansible.builtin.set_fact:
    user_password: "{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_letters', 'digits', 'punctuation'], length=24) }}"

- name: Create user {{ user_name }}
  ansible.builtin.user:
    name: "{{ user_name }}"
    shell: "{{ user_shell }}"
    create_home: true
    groups: sudo
    append: true
    password: "{{ user_password | password_hash('sha512') }}"

- name: Get home directory for {{ user_name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"

- name: Set user home directory fact
  ansible.builtin.set_fact:
    user_home: "{{ ansible_facts.getent_passwd[user_name][4] }}"

- name: Deploy sudoers file for passwordless sudo
  ansible.builtin.copy:
    content: "%sudo ALL=(ALL:ALL) NOPASSWD: ALL\n"
    dest: /etc/sudoers.d/nopasswd-sudo
    mode: "0440"
    validate: "visudo -cf %s"

- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.ssh"
    state: directory
    mode: "0700"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"

- name: Fetch SSH authorized_keys from GitHub
  ansible.posix.authorized_key:
    user: "{{ user_name }}"
    key: "{{ user_github_keys_url }}"
    exclusive: false

- name: Deploy ~/.ssh/rc
  ansible.builtin.template:
    src: ssh_rc.j2
    dest: "{{ user_home }}/.ssh/rc"
    mode: "0755"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"

- name: Deploy ~/.tmux.conf
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: "{{ user_home }}/.tmux.conf"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Deploy ~/.gitconfig
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ user_home }}/.gitconfig"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/bin"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Deploy github-org-setup script
  ansible.builtin.copy:
    src: github-org-setup.sh
    dest: "{{ user_home }}/.local/bin/github-org-setup"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Create ~/github.com directory
  ansible.builtin.file:
    path: "{{ user_home }}/github.com"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Set up initial GitHub organization
  ansible.builtin.command:
    cmd: "{{ user_home }}/.local/bin/github-org-setup --org {{ user_github_org }} --email {{ user_github_org_email }}"
    stdin: "{{ user_github_org_token }}"
  become: true
  become_user: "{{ user_name }}"
  when: user_github_org | length > 0 and user_github_org_email | length > 0 and user_github_org_token | length > 0
  no_log: true
  changed_when: true

- name: Ensure ~/.config/direnv directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/direnv"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Deploy ~/.config/direnv/direnv.toml
  ansible.builtin.copy:
    content: |
      [global]
      load_dotenv = true
    dest: "{{ user_home }}/.config/direnv/direnv.toml"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Deploy bashrc customizations
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    block: |
      export PATH="$HOME/.local/bin:$PATH"
      export IS_SANDBOX=1
      alias claude="claude --dangerously-skip-permissions"
      export VISUAL=vim
      export EDITOR=vim
      eval "$(direnv hook bash)"

- name: Display generated password for {{ user_name }}
  ansible.builtin.debug:
    msg: >-
      Password for user '{{ user_name }}': {{ user_password }}
      (use for SSH and Samba access)

