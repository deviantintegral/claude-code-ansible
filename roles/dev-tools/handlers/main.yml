---
- name: Update CA certificates
  ansible.builtin.command:
    cmd: update-ca-certificates
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  notify: Restart Docker

- name: Restart Docker
  ansible.builtin.systemd_service:
    name: docker
    state: restarted
