---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ base_hostname }}"

- name: Deploy /etc/hosts
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"

- name: Generate locale
  community.general.locale_gen:
    name: "{{ base_locale }}"
    state: present

- name: Set default locale
  ansible.builtin.copy:
    dest: /etc/default/locale
    content: "LANG={{ base_locale }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true

# Node.js from NodeSource
- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource.gpg.key
    mode: "0644"

- name: Dearmor NodeSource GPG key
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource.gpg.key
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Remove temporary NodeSource GPG key file
  ansible.builtin.file:
    path: /tmp/nodesource.gpg.key
    state: absent

- name: Deploy NodeSource APT repository
  ansible.builtin.copy:
    content: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ base_nodejs_major_version }}.x nodistro main\n"
    dest: /etc/apt/sources.list.d/nodesource.list
    owner: root
    group: root
    mode: "0644"

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
